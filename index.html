<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyLogos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image@2.6.0/dist/dom-to-image.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
        .markdown-body { color: #e5e7eb; line-height: 1.6; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 { color: #f3f4f6; margin-top: 1em; margin-bottom: 0.5em; }
        .markdown-body p { margin-bottom: 0.8em; }
        .markdown-body code { background: #374151; padding: 2px 6px; border-radius: 4px; }
        .markdown-body pre { background: #1f2937; padding: 12px; border-radius: 8px; overflow-x: auto; }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body ul, .markdown-body ol { margin-left: 1.5em; margin-bottom: 0.8em; }
        .markdown-body blockquote { border-left: 4px solid #3b82f6; padding-left: 1em; color: #9ca3af; margin: 0.8em 0; }
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .history-sidebar { transition: transform 0.3s ease; }
        .history-sidebar.closed { transform: translateX(100%); }
        .copy-btn { opacity: 0.6; transition: opacity 0.2s; }
        .copy-btn:hover { opacity: 1; }
        .char-count { font-variant-numeric: tabular-nums; }
        .cursor { display: inline-block; width: 2px; height: 1.2em; background: #3b82f6; animation: blink 1s infinite; vertical-align: middle; margin-left: 2px; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        .tag-modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .tag-modal.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .tag-modal:not(.hidden) { opacity: 1; visibility: visible; pointer-events: auto; }
        .tag-pill { transition: all 0.2s ease; }
        .tag-pill:hover { transform: translateY(-1px); }
        .tag-pill.active { ring: 2px; ring-offset: 2px; ring-offset-gray-800; }
    </style>
    <!-- 模式按钮样式 -->
    <style>
        .mode-btn { transition: all 0.2s ease; }
        .mode-btn:hover { transform: translateY(-1px); }
        .mode-btn.active { background: linear-gradient-to-r from-blue-600 to-purple-600); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
    <header class="bg-gray-800 border-b border-gray-700 py-4">
        <div class="max-w-7xl mx-auto px-4 flex items-center justify-between">
            <div class="flex-1"></div>
            <div class="text-center">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">PolyLogos</h1>
                <p class="text-gray-400 text-sm mt-1">多模型 AI 对比工具</p>
                <!-- 模式切换按钮 -->
                <div class="flex justify-center gap-2 mt-2">
                    <a href="index.html" class="mode-btn active px-4 py-1.5 text-sm font-medium rounded-lg bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg no-underline">
                        对比模式
                    </a>
                    <a href="debate.html" class="mode-btn px-4 py-1.5 text-sm font-medium rounded-lg bg-gray-700 text-gray-300 hover:bg-gray-600 no-underline">
                        辩论模式
                    </a>
                </div>
            </div>
            <div class="flex-1 flex justify-end">
                <button id="shareBtn" class="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white text-sm font-medium rounded-lg transition-all transform hover:scale-105 shadow-lg">
                    <span>📸</span>
                    <span>分享</span>
                </button>
            </div>
        </div>
    </header>

    <!-- API 配置区域（可折叠，默认展开） -->
    <section class="bg-gray-800 border-b border-gray-700 py-4">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between mb-3 cursor-pointer" id="apiConfigToggle">
                <h3 class="text-sm font-medium text-gray-300">API 配置</h3>
                <svg id="apiConfigArrow" class="w-5 h-5 text-gray-400 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </div>
            <div id="apiConfigContent" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-blue-500 flex-shrink-0"></div>
                    <input type="password" id="deepseekKey" placeholder="DeepSeek API Key" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-purple-500 flex-shrink-0"></div>
                    <input type="password" id="qwenKey" placeholder="通义千问 API Key" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-green-500 flex-shrink-0"></div>
                    <input type="password" id="glmKey" placeholder="智谱 GLM API Key" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
            </div>
        </div>
    </section>

    <section class="bg-gray-800 border-b border-gray-700 py-4 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto px-4">
            <textarea id="questionInput" placeholder="请输入你的问题..." class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-gray-100 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-2" rows="3"></textarea>
            <div id="currentQuestion" class="hidden mb-3 p-3 bg-gray-700/50 rounded-lg border border-gray-600">
                <span class="text-xs text-gray-400">当前问题：</span>
                <span id="currentQuestionText" class="text-sm text-gray-200"></span>
            </div>
            <div class="flex gap-3">
                <button id="sendBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
                    <svg id="sendIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    <svg id="loadingIcon" class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span>发送</span>
                </button>
                <button id="clearBtn" class="px-6 py-3 bg-gray-600 hover:bg-gray-700 text-white font-semibold rounded-lg transition-colors">清空</button>
            </div>
        </div>
    </section>

    <main class="flex-1 p-4 relative">
        <div class="max-w-7xl mx-auto">
            <!-- 截图区域容器 -->
            <div id="captureArea" class="bg-gray-900 p-4 rounded-xl">
                <!-- 当前问题（截图用副本） -->
                <div id="captureQuestion" class="hidden mb-4 p-4 bg-gray-800 rounded-lg border border-gray-700">
                    <span class="text-xs text-gray-400">问题：</span>
                    <span id="captureQuestionText" class="text-sm text-gray-200"></span>
                </div>
                
                <!-- 融合答案按钮区域 -->
                <div class="flex justify-center mb-6">
                    <button id="fusionBtn" onclick="triggerFusion()" disabled
                        class="px-6 py-3 bg-gradient-to-r from-amber-500 via-purple-500 to-pink-500 
                               hover:from-amber-600 hover:via-purple-600 hover:to-pink-600
                               disabled:from-gray-600 disabled:to-gray-700
                               text-white font-semibold rounded-xl shadow-lg shadow-purple-500/20
                               transition-all duration-300 transform hover:scale-105 disabled:hover:scale-100
                               disabled:cursor-not-allowed disabled:opacity-60
                               flex items-center gap-2 border border-purple-400/30">
                        <span id="fusionBtnIcon">⏳</span>
                        <span id="fusionBtnText">等待模型完成...</span>
                    </button>
                </div>
                
                <!-- 模型管理按钮和排序选择 -->
                <div class="flex justify-between items-center gap-3 mb-4">
                    <div class="flex items-center gap-2">
                        <button id="modelManageBtn" class="flex items-center gap-2 px-4 py-2 bg-gray-700 hover:bg-gray-600 text-white text-sm font-medium rounded-lg transition-all">
                            <span>⚙️</span>
                            <span>模型管理</span>
                        </button>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-400">排序:</span>
                        <select id="sortMethod" class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="default">默认顺序</option>
                            <option value="speed">响应速度</option>
                        </select>
                    </div>
                </div>

                <!-- 融合答案显示区域 -->
                <div id="fusionArea" class="hidden mb-6">
                    <div class="bg-gradient-to-br from-purple-900/40 via-gray-800/80 to-indigo-900/40 
                                border-2 border-purple-500/50 rounded-xl overflow-hidden shadow-xl shadow-purple-500/10">
                        <div class="bg-purple-600/20 border-b border-purple-500/30 px-4 py-3 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="text-xl">✨</span>
                                <h3 class="font-bold text-purple-200">智能整合</h3>
                                <span class="text-xs text-purple-400/70 ml-2">完整信息整合</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="copyFusionResult()" 
                                    class="text-purple-300 hover:text-white transition-colors p-1.5 rounded-lg hover:bg-purple-500/20"
                                    title="复制整合结果">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                    </svg>
                                </button>
                                <button onclick="closeFusionArea()" 
                                    class="text-purple-300 hover:text-white transition-colors p-1.5 rounded-lg hover:bg-purple-500/20"
                                    title="关闭">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div id="fusionContent" class="p-5 min-h-[150px]">
                            <div class="flex items-center justify-center h-32 text-purple-300/60">
                                <div class="flex flex-col items-center gap-3">
                                    <svg class="w-8 h-8 animate-spin" fill="none" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    <span class="text-sm">正在整合模型信息...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 动态模型对比列容器 -->
                <div id="modelColumnsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- 动态生成模型列 -->
                </div>
            </div>
        </div>

        <button id="historyToggle" class="fixed right-4 top-1/2 -translate-y-1/2 bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-l-lg shadow-lg z-50">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>

        <div id="historySidebar" class="history-sidebar closed fixed right-0 top-0 h-full w-80 bg-gray-800 border-l border-gray-700 shadow-2xl z-40 overflow-y-auto">
            <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                <h3 class="font-semibold text-lg">历史记录</h3>
                <button id="closeHistory" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4">
                <!-- 搜索框区域 -->
                <div class="mb-4">
                    <div style="position: relative;">
                        <input type="text" id="history-search-input" placeholder="搜索历史记录..." style="width: 100%; padding: 6px 30px 6px 30px; background: #374151; border: none; border-radius: 6px; color: #f3f4f6; font-size: 14px;">
                        <span style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%); opacity: 0.6;">🔍</span>
                        <span id="history-search-clear" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; opacity: 0.6; display: none;">✕</span>
                    </div>
                </div>
                <!-- 类型筛选按钮 -->
                <div id="typeFilterArea" class="mb-4">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-xs text-gray-400">类型筛选</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button id="filter-all" onclick="setHistoryTypeFilter('all')" class="px-3 py-1 text-xs rounded-full bg-blue-600 text-white transition-colors">
                            全部
                        </button>
                        <button id="filter-chat" onclick="setHistoryTypeFilter('chat')" class="px-3 py-1 text-xs rounded-full bg-gray-600 text-gray-300 hover:bg-gray-500 transition-colors">
                            💬 对比
                        </button>
                    </div>
                </div>
                <!-- 标签筛选区域 -->
                <div id="tagFilterArea" class="mb-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-xs text-gray-400">标签筛选</span>
                        <button id="manageTagsBtn" class="text-xs text-blue-400 hover:text-blue-300">管理标签</button>
                    </div>
                    <div id="tagFilterList" class="flex flex-wrap gap-2">
                        <!-- 动态生成标签列表 -->
                    </div>
                </div>
                <button id="clearHistoryBtn" class="w-full mb-4 px-4 py-2 bg-red-600 hover:bg-red-700 text-white text-sm rounded-lg transition-colors">清空历史</button>
                <div id="historyList" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <!-- 模型管理模态框 -->
    <div id="modelManageModal" class="tag-modal hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-800 rounded-xl border border-gray-700 w-full max-w-2xl max-h-[80vh] flex flex-col">
            <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                <h3 class="font-semibold text-lg">模型管理</h3>
                <button id="closeModelManageModal" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-1">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="text-gray-400 border-b border-gray-700">
                            <th class="text-left py-2 px-2">启用</th>
                            <th class="text-left py-2 px-2">模型名称</th>
                            <th class="text-left py-2 px-2">API 格式</th>
                            <th class="text-left py-2 px-2">免费</th>
                            <th class="text-left py-2 px-2">API Key</th>
                        </tr>
                    </thead>
                    <tbody id="modelManageTableBody">
                        <!-- 动态生成模型行 -->
                    </tbody>
                </table>
            </div>
            <div class="p-4 border-t border-gray-700 flex justify-end gap-3">
                <button id="cancelModelManageBtn" class="px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white text-sm rounded-lg transition-colors">取消</button>
                <button id="saveModelManageBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-lg transition-colors">保存设置</button>
            </div>
        </div>
    </div>

    <!-- 标签管理模态框 -->
    <div id="tagModal" class="tag-modal hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-800 rounded-xl border border-gray-700 w-full max-w-md max-h-[80vh] flex flex-col">
            <div class="p-4 border-b border-gray-700 flex items-center justify-between">
                <h3 class="font-semibold text-lg">管理标签</h3>
                <button id="closeTagModal" class="text-gray-400 hover:text-white">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-4 flex-1 overflow-y-auto">
                <!-- 创建新标签 -->
                <div class="mb-4">
                    <label class="text-xs text-gray-400 block mb-2">创建新标签</label>
                    <div class="flex gap-2">
                        <input type="text" id="newTagName" placeholder="标签名称" class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <input type="color" id="newTagColor" value="#3b82f6" class="w-10 h-10 rounded-lg cursor-pointer bg-gray-700 border border-gray-600">
                        <button id="createTagBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-lg transition-colors">添加</button>
                    </div>
                </div>
                <!-- 现有标签列表 -->
                <div>
                    <label class="text-xs text-gray-400 block mb-2">现有标签</label>
                    <div id="tagList" class="space-y-2">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑历史记录标签模态框 -->
    <div id="editTagsModal" class="tag-modal hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-800 rounded-xl border border-gray-700 w-full max-w-sm">
            <div class="p-4 border-b border-gray-700">
                <h3 class="font-semibold text-lg">编辑标签</h3>
                <p id="editTagsQuestion" class="text-xs text-gray-400 mt-1 line-clamp-2"></p>
            </div>
            <div class="p-4">
                <label class="text-xs text-gray-400 block mb-2">选择标签（可多选）</label>
                <div id="editTagsList" class="flex flex-wrap gap-2 mb-4">
                    <!-- 动态生成 -->
                </div>
                <div class="flex gap-2">
                    <button id="saveEditTagsBtn" class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-lg transition-colors">保存</button>
                    <button id="cancelEditTagsBtn" class="flex-1 px-4 py-2 bg-gray-600 hover:bg-gray-700 text-white text-sm rounded-lg transition-colors">取消</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 存储键
        const STORAGE_KEY = 'polylogos_history';
        const TAGS_STORAGE_KEY = 'polylogos_tags';
        const MODELS_STORAGE_KEY = 'polylogos_models';
        const MODEL_ORDER_KEY = 'polylogos_model_order';
        const RESPONSE_TIMES_KEY = 'polylogos_response_times';
        
        // 响应时间记录
        let responseTimes = {};
        let modelSortable = null;
        
        // 状态
        let modelAnswers = {};
        let currentRecord = null;
        let streamingStatus = {};
        let isExporting = false;
        let selectedTagIds = new Set();
        let editingHistoryIndex = null;
        // 当前启用的模型列表
        let enabledModelsList = [];
        
        // 当前搜索关键词
        let currentSearchKeyword = '';
        let searchDebounceTimer = null;

        // 历史记录类型筛选
        let currentTypeFilter = 'all'; // 'all' | 'chat'
        
        // 预设模型列表
        const DEFAULT_MODELS = [
            { id: 'deepseek', name: 'DeepSeek', apiFormat: 'OpenAI 兼容', isFree: true, enabled: true, apiKey: '', color: '#3b82f6', colorClass: 'blue', inputId: 'deepseekKey' },
            { id: 'qwen', name: '通义千问', apiFormat: 'OpenAI 兼容', isFree: false, enabled: true, apiKey: '', color: '#a855f7', colorClass: 'purple', inputId: 'qwenKey' },
            { id: 'glm', name: '智谱 GLM', apiFormat: 'OpenAI 兼容', isFree: true, enabled: true, apiKey: '', color: '#22c55e', colorClass: 'green', inputId: 'glmKey' },

        // 初始化 Sortable
        function initSortable() {
            const container = document.getElementById('modelColumnsContainer');
            if (!container) return;
            
            // 如果已存在，先销毁
            if (modelSortable) {
                modelSortable.destroy();
            }
            
            modelSortable = new Sortable(container, {
                animation: 150,
                ghostClass: 'opacity-50',
                dragClass: 'shadow-lg',
                onEnd: function(evt) {
                    // 获取新的顺序
                    const newOrder = [];
                    container.querySelectorAll('[data-model-id]').forEach(el => {
                        newOrder.push(el.dataset.modelId);
                    });
                    saveModelOrder(newOrder);
                    
                    // 同步更新 enabledModelsList 的顺序
                    const orderedModels = [];
                    newOrder.forEach(id => {
                        const model = enabledModelsList.find(m => m.id === id);
                        if (model) orderedModels.push(model);
                    });
                    enabledModelsList = orderedModels;
                }
            });
        }
        
        // 按响应速度排序模型
        function sortModelsBySpeed() {
            const container = document.getElementById('modelColumnsContainer');
            if (!container) return;
            
            // 获取所有卡片
            const cards = Array.from(container.children);
            
            // 按响应时间排序（有数据的排在前面，按耗时升序）
            cards.sort((a, b) => {
                const idA = a.dataset.modelId;
                const idB = b.dataset.modelId;
                const timeA = responseTimes[idA];
                const timeB = responseTimes[idB];
                
                // 如果都没有数据，保持原顺序
                if (timeA === undefined && timeB === undefined) return 0;
                // 没有数据的排在最后
                if (timeA === undefined) return 1;
                if (timeB === undefined) return -1;
                // 按耗时升序（快的在前）
                return timeA - timeB;
            });
            
            // 重新插入
            cards.forEach(card => container.appendChild(card));
        }
        
        // 恢复默认顺序（拖拽顺序）
        function restoreDefaultOrder() {
            const savedOrder = getModelOrder();
            if (!savedOrder || savedOrder.length === 0) return;
            
            const container = document.getElementById('modelColumnsContainer');
            if (!container) return;
            
            const cards = Array.from(container.children);
            const cardMap = new Map();
            cards.forEach(card => {
                cardMap.set(card.dataset.modelId, card);
            });
            
            // 按保存的顺序重新排列
            savedOrder.forEach(modelId => {
                const card = cardMap.get(modelId);
                if (card) {
                    container.appendChild(card);
                }
            });
            
            // 同步更新 enabledModelsList
            const orderedModels = [];
            savedOrder.forEach(id => {
                const model = enabledModelsList.find(m => m.id === id);
                if (model) orderedModels.push(model);
            });
            // 添加不在顺序中的模型
            enabledModelsList.forEach(model => {
                if (!savedOrder.includes(model.id)) {
                    orderedModels.push(model);
                }
            });
            enabledModelsList = orderedModels;
        }
        
        // 处理排序方式变化
        function handleSortChange(method) {
            if (method === 'speed') {
                sortModelsBySpeed();
            } else {
                restoreDefaultOrder();
            }
        }

                try {
                    const savedConfigs = JSON.parse(stored);
                    // 合并保存的配置和默认配置
                    modelConfigs = DEFAULT_MODELS.map(defaultModel => {
                        const saved = savedConfigs.find(c => c.id === defaultModel.id);
                        return saved ? { ...defaultModel, ...saved } : defaultModel;
                    });
                } catch (e) {
                    modelConfigs = [...DEFAULT_MODELS];
                }
            } else {
                modelConfigs = [...DEFAULT_MODELS];
            }
            // 应用模型配置（渲染对比列）
            applyModelConfig();
            // 同步到顶部 API 配置区域
            syncApiKeysToTop();
            // 初始化拖拽排序
            initSortable();
        }

            const tags = getTags();
            const newTag = {
                id: 'custom-' + Date.now(),

                color: color,
                isSystem: false
            };
            tags.push(newTag);

        // 删除标签
        function deleteTag(tagId) {
            const tags = getTags();
            const tag = tags.find(t => t.id === tagId);
            if (tag && tag.isSystem) {
                alert('系统标签不能删除');
                return;
            }
            const newTags = tags.filter(t => t.id !== tagId);
            saveTags(newTags);
            
            // 从所有历史记录中移除该标签
            const history = getHistory();
            history.forEach(item => {
                if (item.tagIds) {
                    item.tagIds = item.tagIds.filter(id => id !== tagId);
                }
            });
            saveHistoryWithoutRender(history);
            
            // 从筛选中移除
            selectedTagIds.delete(tagId);
        }

            tag.name = name.trim();
            tag.color = color;
            saveTags(tags);
        }

        // 自动分类问题
        async function classifyQuestion(question, apiKey) {
            if (!apiKey) return 'system-uncategorized';
            
            try {
                const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': 'Bearer ' + apiKey 
                    },
                    body: JSON.stringify({ 
                        model: 'glm-4-flash', 
                        messages: [{ 
                            role: 'user', 
                            content: `请将以下问题分类到以下类别之一：编程、生活、学习、创意、其他。\n只返回类别名称，不要有其他内容。\n\n问题：${question}\n\n分类：` 
                        }], 
                        stream: false,
                        temperature: 0.1
                    })
                });

                if (!response.ok) return 'system-uncategorized';
                
                const data = await response.json();
                const category = data.choices?.[0]?.message?.content?.trim() || '未分类';
                
                // 映射到系统标签ID
                const categoryMap = {
                    '编程': 'system-programming',
                    '生活': 'system-life',
                    '学习': 'system-study',
                    '创意': 'system-creative',
                    '其他': 'system-other',
                    '未分类': 'system-uncategorized'
                };
                
                return categoryMap[category] || 'system-uncategorized';
            } catch (error) {
                console.error('分类失败:', error);
                return 'system-uncategorized';
            }
        }

        // 按关键词过滤历史记录
        function filterHistoryBySearch(history, keyword) {
            if (!keyword || keyword.trim() === '') {
                return history;
            }
            const lowerKeyword = keyword.toLowerCase().trim();
            return history.filter(item => {
                // 搜索问题字段
                if (item.question && item.question.toLowerCase().includes(lowerKeyword)) {
                    return true;
                }
                // 搜索辩题字段（辩论记录）
                if (item.topic && item.topic.toLowerCase().includes(lowerKeyword)) {
                    return true;
                }
                // 搜索所有模型的回复内容
                if (item.responses) {
                    for (const modelId in item.responses) {
                        const response = item.responses[modelId];
                        if (response && response.content && response.content.toLowerCase().includes(lowerKeyword)) {
                            return true;
                        }
                    }
                }
                // 搜索辩论消息内容
                if (item.messages) {
                    for (const msg of item.messages) {
                        if (msg.content && msg.content.toLowerCase().includes(lowerKeyword)) {
                            return true;
                        }
                    }
                }
                return false;
            });
        }

            const regex = new RegExp(`(${escapedKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return escapedText.replace(regex, '<mark style="background: #f59e0b; color: #000; padding: 0 2px; border-radius: 2px;">$1</mark>');
        }

        async function streamDeepSeek(apiKey, question) {
            const startTime = Date.now();
            showStreaming('deepseek-content', 'deepseek-status', 'DeepSeek');
            updateCharCount('deepseek', '');
            modelAnswers.deepseek = '';
            const contentEl = document.getElementById('deepseek-content');
            const textEl = contentEl.querySelector('div');
            let fullText = '';

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
                    body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: question }], stream: true })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error?.message || 'HTTP ' + response.status);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.trim() === '' || line.trim() === 'data: [DONE]') continue;
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices?.[0]?.delta?.content;
                                if (content) {
                                    fullText += content;
                                    textEl.textContent = fullText;
                                    contentEl.scrollTop = contentEl.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }

                modelAnswers.deepseek = fullText;
                updateCharCount('deepseek', fullText);
                finishStreaming('deepseek-content', 'deepseek-status', fullText);
                // 记录响应时间
                const duration = Date.now() - startTime;
                saveResponseTime('deepseek', duration);
                return fullText;
            } catch (error) {
                modelAnswers.deepseek = '';
                updateCharCount('deepseek', '');
                showError('deepseek-content', 'deepseek-status', error.message);
                return null;
            }
        }

        async function streamQwen(apiKey, question) {
            const startTime = Date.now();
            showStreaming('qwen-content', 'qwen-status', '通义千问');
            updateCharCount('qwen', '');
            modelAnswers.qwen = '';
            const contentEl = document.getElementById('qwen-content');
            const textEl = contentEl.querySelector('div');
            let fullText = '';

            console.log('[通义千问] 开始调用，API Key:', apiKey.substring(0, 10) + '...');

            try {
                const response = await fetch('https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': 'Bearer ' + apiKey 
                    },
                    body: JSON.stringify({ 
                        model: 'qwen-plus', 
                        messages: [{ role: 'user', content: question }], 
                        stream: true 
                    })
                });

                console.log('[通义千问] 响应状态:', response.status, response.statusText);

                if (!response.ok) {
                    let errorMessage = 'HTTP ' + response.status;
                    let errorData = {};
                    
                    try {
                        const errorText = await response.text();
                        console.error('[通义千问] 错误响应:', errorText);
                        errorData = JSON.parse(errorText);
                        errorMessage = errorData.error?.message || errorData.message || errorText;
                    } catch (e) {
                        console.error('[通义千问] 无法解析错误响应:', e);
                    }
                    
                    // 特殊处理欠费错误
                    if (response.status === 400 && (errorMessage.includes('Arrearage') || errorMessage.includes('欠费'))) {
                        throw new Error('ARREARAGE:账户欠费');
                    }
                    
                    throw new Error(errorMessage);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.trim() === '' || line.trim() === 'data: [DONE]') continue;
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                const content = data.choices?.[0]?.delta?.content;
                                if (content) {
                                    fullText += content;
                                    textEl.textContent = fullText;
                                    contentEl.scrollTop = contentEl.scrollHeight;
                                }
                            } catch (e) {
                                console.warn('[通义千问] 解析SSE数据失败:', line, e);
                            }
                        }
                    }
                }

                modelAnswers.qwen = fullText;
                updateCharCount('qwen', fullText);
                finishStreaming('qwen-content', 'qwen-status', fullText);
                // 记录响应时间
                const duration = Date.now() - startTime;
                saveResponseTime('qwen', duration);
                console.log('[通义千问] 调用成功，回答长度:', fullText.length);
                return fullText;
            } catch (error) {
                console.error('[通义千问] 调用失败:', error);
                modelAnswers.qwen = '';
                updateCharCount('qwen', '');
                
                // 处理欠费错误，显示备用方案
                if (error.message.includes('ARREARAGE') || error.message.includes('欠费') || error.message.includes('400')) {
                    showQwenFallback(question, apiKey);

                return null;
            }
        }

        document.getElementById('sendBtn').addEventListener('click', async function() {
            const question = document.getElementById('questionInput').value.trim();
            if (!question) return;

            // 获取启用的模型及其 API Key
            const enabledModels = enabledModelsList.filter(model => {
                const input = document.getElementById(model.inputId);
                return input && input.value.trim();
            });

            if (enabledModels.length === 0) {
                alert('请至少配置一个启用的模型的 API Key');
                return;
            }

            document.getElementById('currentQuestion').classList.remove('hidden');
            document.getElementById('currentQuestionText').textContent = question;

            const btn = document.getElementById('sendBtn');
            document.getElementById('sendIcon').classList.add('hidden');
            document.getElementById('loadingIcon').classList.remove('hidden');
            btn.disabled = true;

            currentRecord = { question, responses: {} };
            const promises = [];

            // 动态处理所有启用的模型
            enabledModels.forEach(model => {
                const apiKey = document.getElementById(model.inputId).value.trim();
                if (apiKey) {
                    // 根据模型 ID 调用对应的流式函数
                    switch(model.id) {
                        case 'deepseek':
                            promises.push(streamDeepSeek(apiKey, question).then(r => { if (r) currentRecord.responses.deepseek = r; }));
                            break;
                        case 'qwen':
                            promises.push(streamQwen(apiKey, question).then(r => { if (r) currentRecord.responses.qwen = r; }));
                            break;
                        case 'glm':
                            promises.push(streamGLM(apiKey, question).then(r => { if (r) currentRecord.responses.glm = r; }));
                            break;
                        case 'kimi':
                            promises.push(streamKimi(apiKey, question).then(r => { if (r) currentRecord.responses.kimi = r; }));
                            break;
                        case 'chatgpt':
                            promises.push(streamChatGPT(apiKey, question).then(r => { if (r) currentRecord.responses.chatgpt = r; }));
                            break;
                        case 'gemini':
                            promises.push(streamGemini(apiKey, question).then(r => { if (r) currentRecord.responses.gemini = r; }));
                            break;
                    }
                } else {
                    // 未配置 API Key
                    document.getElementById(`${model.id}-status`).textContent = '未配置';
                    document.getElementById(`${model.id}-status`).className = 'text-xs text-gray-500';
                    document.getElementById(`${model.id}-content`).innerHTML = '<div class="text-gray-500 text-sm">未配置 API Key</div>';
                    updateCharCount(model.id, '');
                }
            });

            await Promise.all(promises);

            if (Object.keys(currentRecord.responses).length > 0) {
                // 使用 GLM Key 进行分类（优先使用用户配置的智谱 Key）
                const glmModel = enabledModels.find(m => m.id === 'glm');
                const glmKey = glmModel ? document.getElementById('glmKey')?.value.trim() : '';
                await addToHistory(currentRecord.question, currentRecord.responses, glmKey || enabledModels[0]?.apiKey);
            }

            document.getElementById('sendIcon').classList.remove('hidden');
            document.getElementById('loadingIcon').classList.add('hidden');
            btn.disabled = false;
        });

        // 点击模态框背景关闭
        document.getElementById('tagModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('tagModal')) {
                document.getElementById('tagModal').classList.add('hidden');
            }
        });

        document.getElementById('editTagsModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('editTagsModal')) {
                document.getElementById('editTagsModal').classList.add('hidden');
                editingHistoryIndex = null;
            }
        });

        // 导出分享图片功能
        async function exportImage() {
            // 检查是否有模型正在回答中
            const anyStreaming = Object.values(streamingStatus).some(status => status);
            if (anyStreaming) {
                alert('请等待所有模型回答完成后再导出图片');
                return;
            }

            const currentQuestion = document.getElementById('currentQuestionText').textContent;
            const hasContent = Object.values(modelAnswers).some(answer => answer && answer.length > 0);
            if (!currentQuestion && !hasContent) {
                alert('没有可导出的内容');
                return;
            }

            if (isExporting) return;
            isExporting = true;

            const shareBtn = document.getElementById('shareBtn');
            const originalText = shareBtn.innerHTML;
            shareBtn.innerHTML = '<span class="animate-spin">⏳</span><span>生成中...</span>';
            shareBtn.disabled = true;

            const originalScrollX = window.scrollX;
            const originalScrollY = window.scrollY;

            try {
                window.scrollTo(0, 0);

                const captureQuestion = document.getElementById('captureQuestion');
                const captureQuestionText = document.getElementById('captureQuestionText');
                if (currentQuestion) {
                    captureQuestionText.textContent = currentQuestion;
                    captureQuestion.classList.remove('hidden');
                } else {
                    captureQuestion.classList.add('hidden');
                }

                await new Promise(resolve => setTimeout(resolve, 100));

                const captureArea = document.getElementById('captureArea');

                const originalOverflow = captureArea.style.overflow;
                const originalMaxHeight = captureArea.style.maxHeight;
                const originalHeight = captureArea.style.height;

                captureArea.style.overflow = 'visible';
                captureArea.style.maxHeight = 'none';
                captureArea.style.height = 'auto';

                // 动态获取所有启用的模型的内容区域
                const contentAreas = enabledModelsList.map(model => document.getElementById(`${model.id}-content`)).filter(el => el);

                const originalContentStyles = contentAreas.map(el => ({
                    overflow: el.style.overflow,
                    maxHeight: el.style.maxHeight,
                    height: el.style.height
                }));

                contentAreas.forEach(el => {
                    el.style.overflow = 'visible';
                    el.style.maxHeight = 'none';
                    el.style.height = 'auto';
                });

                await new Promise(resolve => setTimeout(resolve, 100));

                const dataUrl = await domtoimage.toPng(captureArea, {
                    quality: 1.0,
                    bgcolor: '#111827',
                    width: captureArea.scrollWidth,
                    height: captureArea.scrollHeight
                });

                captureArea.style.overflow = originalOverflow;
                captureArea.style.maxHeight = originalMaxHeight;
                captureArea.style.height = originalHeight;

                contentAreas.forEach((el, index) => {
                    el.style.overflow = originalContentStyles[index].overflow;
                    el.style.maxHeight = originalContentStyles[index].maxHeight;
                    el.style.height = originalContentStyles[index].height;
                });

                const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
                const filename = `polylogos-对比-${timestamp}.png`;

                const link = document.createElement('a');
                link.download = filename;
                link.href = dataUrl;
                link.click();

            } catch (error) {
                console.error('导出图片失败:', error);
                alert('导出图片失败: ' + error.message);
            } finally {
                window.scrollTo(originalScrollX, originalScrollY);
                isExporting = false;
                shareBtn.innerHTML = originalText;
                shareBtn.disabled = false;
            }
        }

        document.getElementById('shareBtn').addEventListener('click', exportImage);

        // API配置区域折叠/展开
        document.getElementById('apiConfigToggle').addEventListener('click', function() {
            const content = document.getElementById('apiConfigContent');
            const arrow = document.getElementById('apiConfigArrow');
            content.classList.toggle('hidden');
            arrow.classList.toggle('rotate-180');
        });

        // 模型管理模态框事件
        document.getElementById('modelManageBtn').addEventListener('click', () => {
            renderModelManageTable();
            document.getElementById('modelManageModal').classList.remove('hidden');
        });

        document.getElementById('closeModelManageModal').addEventListener('click', () => {
            document.getElementById('modelManageModal').classList.add('hidden');
        });

        document.getElementById('cancelModelManageBtn').addEventListener('click', () => {
            document.getElementById('modelManageModal').classList.add('hidden');
        });

        document.getElementById('saveModelManageBtn').addEventListener('click', () => {
            saveModelConfigs();
            document.getElementById('modelManageModal').classList.add('hidden');
        });

        // 点击模态框背景关闭
        document.getElementById('modelManageModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modelManageModal')) {
                document.getElementById('modelManageModal').classList.add('hidden');
            }
        });

        // 排序方式切换
        document.getElementById('sortMethod').addEventListener('change', function() {
            handleSortChange(this.value);
        });

        // 初始化
        initResponseTimes();
        initModelConfigs();
        initTags();
        renderTagFilter();
        initHistorySearch(); // 初始化历史记录搜索功能
        loadHistory();
    </script>
</body>
